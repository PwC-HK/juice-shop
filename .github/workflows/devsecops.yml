# DevSecOps pipeline onboarding — that's all a project needs.
name: devsecops
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  pipeline:
    uses: PwC-HK/platform-workflows/.github/workflows/ci-security.yml@main
    permissions:
      contents: read
      security-events: write   # CodeQL + Trivy SARIF upload
      pull-requests: write     # dependency review + AI-provenance labelling
      id-token: write          # OIDC to AWS + keyless Cosign
      actions: read
    with:
      image-name: juice-shop
      codeql-language: javascript-typescript
    secrets: inherit
